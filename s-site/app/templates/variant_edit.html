{# Страница редактирования варианта: управление названием, заданиями, ключами и изображениями. #}
{% extends "base.html" %}
{% block content %}
<h1>Редактирование варианта <span id="variantName"></span></h1>
<input type="text" id="variantNameInput" class="form-control w-50 mb-3" placeholder="Название варианта">
<div id="tasksContainer"></div>
<div class="mt-3">
    <button id="addTaskBtn" class="btn btn-primary">Добавить задание</button>
    <button id="saveVariantBtn" class="btn btn-success ms-2">Сохранить вариант</button>
    <button id="deleteVariantBtn" class="btn btn-danger ms-2">Удалить вариант</button>
    <a href="/editor/variants" class="btn btn-secondary ms-2">Назад</a>
</div>

<script>
    const variantId = {{ variant_id|tojson }};
    console.log('variantId =', variantId);

    function loadVariant() {
        fetch('/api/variants/' + variantId)
            .then(r => r.json())
            .then(data => {
                console.log('Загружен вариант:', data);
                document.getElementById('variantName').innerText = data.name;
                document.getElementById('variantNameInput').value = data.name;
                renderTasks(data.tasks);
            })
            .catch(e => console.error('Ошибка загрузки:', e));
    }

    function renderTasks(tasks) {
        const container = document.getElementById('tasksContainer');
        container.innerHTML = '';
        
        tasks.forEach((task, idx) => {
            const card = document.createElement('div');
            card.className = 'card mb-3';
            card.innerHTML = 
                '<div class="card-body">' +
                    '<h5 class="card-title">Задание ' + (idx + 1) + '</h5>' +
                    '<div class="mb-2">' +
                        '<label class="form-label">Текст задания:</label>' +
                        '<textarea class="form-control task-text" data-id="' + task.id + '" rows="3">' + escapeHtml(task.text) + '</textarea>' +
                    '</div>' +
                    '<div class="mb-2">' +
                        '<label class="form-label">Изображение:</label>' +
                        (task.image_data ? '<img src="' + task.image_data + '" class="img-fluid mb-2" style="max-width: 200px;">' : '') +
                        '<input type="file" class="form-control task-image-upload" data-id="' + task.id + '" accept="image/*">' +
                    '</div>' +
                    '<div class="mb-2">' +
                        '<label class="form-label fw-bold text-success">Правильный ответ (ключ):</label>' +
                        '<input type="text" class="form-control task-key" data-id="' + task.id + '" value="' + escapeAttr(task.key) + '" placeholder="Введите правильный ответ">' +
                    '</div>' +
                    '<button class="btn btn-danger btn-sm delete-task" data-id="' + task.id + '">Удалить задание</button>' +
                '</div>';
            container.appendChild(card);
        });
        
        attachTaskEvents();
    }

    function attachTaskEvents() {
        document.querySelectorAll('.delete-task').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const taskId = btn.dataset.id;
                if (confirm('Удалить задание?')) {
                    fetch('/api/tasks/' + taskId, {method: 'DELETE'})
                        .then(() => loadVariant());
                }
            });
        });

        document.querySelectorAll('.task-image-upload').forEach(input => {
            input.addEventListener('change', (e) => {
                const taskId = input.dataset.id;
                const file = input.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        fetch('/api/tasks/' + taskId, {
                            method: 'PUT',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({image_data: event.target.result})
                        }).then(() => loadVariant());
                    };
                    reader.readAsDataURL(file);
                }
            });
        });
        
        // Данные задания сохраняются при потере фокуса у полей текста и ключа.
        document.querySelectorAll('.task-text, .task-key').forEach(input => {
            input.addEventListener('blur', (e) => {
                const taskId = input.dataset.id;
                const text = document.querySelector('.task-text[data-id="' + taskId + '"]').value;
                const key = document.querySelector('.task-key[data-id="' + taskId + '"]').value;
                fetch('/api/tasks/' + taskId, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text: text, key: key})
                });
            });
        });
    }

    document.getElementById('addTaskBtn').onclick = () => {
        fetch('/api/variants/' + variantId + '/tasks', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text: '', image_data: '', key: ''})
        }).then(() => loadVariant());
    };

    document.getElementById('saveVariantBtn').onclick = () => {
        const newName = document.getElementById('variantNameInput').value;
        fetch('/api/variants/' + variantId, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: newName})
        }).then(() => {
            alert('Сохранено!');
            loadVariant();
        });
    };

    document.getElementById('deleteVariantBtn').onclick = () => {
        if (confirm('Удалить весь вариант?')) {
            fetch('/api/variants/' + variantId, {method: 'DELETE'})
                .then(() => window.location.href = '/editor/variants');
        }
    };

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function escapeAttr(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    loadVariant();
</script>
{% endblock %}
{# Основная логика редактирования выполняется через REST API без перезагрузки страницы. #}
