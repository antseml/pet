{# Список вариантов в режиме редактора с возможностью удаления. #}
{% extends "base.html" %}
{% block content %}
<h1>Список вариантов</h1>
<div id="variantsList"></div>
<a href="/editor" class="btn btn-secondary mt-3">Назад</a>

<script>
    function loadVariants() {
        fetch('/api/variants')
            .then(response => response.json())
            .then(variants => {
                const container = document.getElementById('variantsList');
                container.innerHTML = '';
                
                if (variants.length === 0) {
                    container.innerHTML = '<p>Нет вариантов. Создайте первый!</p>';
                    return;
                }
                
                let html = '<table class="table table-striped"><thead><tr><th>ID</th><th>Название</th><th>Статус</th><th>Действия</th></thead><tbody>';
                
                for (let i = 0; i < variants.length; i++) {
                    const v = variants[i];
                    html += '<tr>';
                    html += '<td><a href="/editor/variant/' + v.id + '">' + v.id + '</a></td>';
                    html += '<td>' + escapeHtml(v.name) + '</td>';
                    html += '<td>' + (v.completed ? 'Решен' : 'Новый') + '</td>';
                    html += '<td><button class="btn btn-danger btn-sm delete-btn" data-id="' + v.id + '" data-name="' + escapeAttr(v.name) + '">Удалить</button></td>';
                    html += '</tr>';
                }
                
                html += '</tbody></table>';
                container.innerHTML = html;
                
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const id = btn.dataset.id;
                        const name = btn.dataset.name;
                        if (confirm('Удалить вариант "' + name + '" (ID: ' + id + ')? Все задания будут удалены!')) {
                            await fetch('/api/variants/' + id, {method: 'DELETE'});
                            loadVariants();
                        }
                    });
                });
            })
            .catch(error => {
                console.error('Ошибка:', error);
                document.getElementById('variantsList').innerHTML = '<p>Ошибка загрузки вариантов</p>';
            });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function escapeAttr(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    
    loadVariants();
</script>
{% endblock %}
{# Таблица и обработчики кнопок удаления формируются на клиенте после загрузки данных. #}
