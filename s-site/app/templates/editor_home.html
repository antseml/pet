{# Страница редактора: создание нового варианта и переход к списку вариантов. #}
{% extends "base.html" %}
{% block content %}
<div class="text-center">
    <h1>Редактор</h1>
    <div class="mt-4">
        <button id="createVariantBtn" class="btn btn-success btn-lg me-3">Создать вариант</button>
        <a href="/editor/variants" class="btn btn-primary btn-lg">Редактировать варианты</a>
    </div>
</div>

<script>
    document.getElementById('createVariantBtn').addEventListener('click', async () => {
        const name = prompt('Введите название варианта:');
        if (name) {
            const response = await fetch('/api/variants', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: name})
            });
            const data = await response.json();
            window.location.href = `/editor/variant/${data.id}`;
        }
    });
</script>
{% endblock %}
{# Создание варианта выполняется через API с последующим переходом к редактированию. #}
