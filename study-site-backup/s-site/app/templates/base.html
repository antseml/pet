<!-- Базовый шаблон: общая разметка, навигация и полноэкранный чат для всех страниц. -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Учебные варианты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-top: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .navbar {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%) !important;
            border-radius: 15px;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .navbar-brand {
            color: #1a1a2e !important;
            font-weight: bold;
        }
        .navbar-nav .nav-link {
            color: #1a1a2e !important;
            font-weight: 500;
            transition: all 0.3s ease;
            border-radius: 25px;
            padding: 8px 20px;
            margin: 0 5px;
        }
        .navbar-nav .nav-link:hover {
            background: rgba(0, 0, 0, 0.1);
            color: #000 !important;
            transform: translateY(-2px);
        }
        .navbar-nav .nav-link.active {
            background: rgba(0, 0, 0, 0.2) !important;
            color: #000 !important;
            border-radius: 25px;
            font-weight: bold;
        }
        .btn-chat {
            background: rgba(0, 0, 0, 0.15);
            color: #1a1a2e !important;
            border-radius: 25px;
            padding: 8px 20px;
            margin-left: 10px;
            border: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-chat:hover {
            background: rgba(0, 0, 0, 0.25);
            color: #000 !important;
            transform: translateY(-2px);
        }
        
        .navbar-toggler {
            border-color: rgba(0, 0, 0, 0.3);
        }
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(0, 0, 0, 0.8)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e") !important;
        }
        
        .fullscreen-chat {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2000;
            background: white;
            display: none;
            flex-direction: column;
        }
        .fullscreen-chat .chat-header {
            background: #4f46e5;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .fullscreen-chat .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f8f9fa;
        }
        .fullscreen-chat .chat-input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #dee2e6;
            display: flex;
        }
        .fullscreen-chat .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 25px;
            outline: none;
        }
        .fullscreen-chat .chat-input-area button {
            margin-left: 10px;
            padding: 12px 24px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 25px;
        }
        .message-user {
            text-align: right;
            margin-bottom: 12px;
        }
        .message-user div {
            display: inline-block;
            background: #4f46e5;
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 70%;
            white-space: pre-wrap;
            word-wrap: break-word;
            text-align: left;
        }
        .message-assistant {
            text-align: left;
            margin-bottom: 12px;
        }
        .message-assistant div {
            display: inline-block;
            background: #e9ecef;
            color: #333;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 70%;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .close-chat {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 15px;
                margin: 10px;
            }
            .navbar-nav {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
            .nav-item {
                margin: 5px;
            }
            .navbar-brand {
                font-size: 14px;
            }
            .nav-link, .btn-chat {
                padding: 5px 12px !important;
                font-size: 12px;
            }
            .message-user div, .message-assistant div {
                max-width: 85%;
            }
            
            .table-responsive {
                overflow-x: auto;
                display: block;
                width: 100%;
            }
            .table {
                min-width: 500px;
            }
            .table td, .table th {
                white-space: normal;
                word-break: break-word;
            }
            .table .btn-sm {
                padding: 4px 8px;
                font-size: 11px;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Учебные варианты</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/editor">Редактор</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/student">Ученик</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-chat" id="chatMenuBtn">💬 Чат с ИИ</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <div id="fullscreenChat" class="fullscreen-chat">
        <div class="chat-header">
            <span><strong>🤖 Помощник по учебе</strong></span>
            <button class="close-chat" id="closeFullscreenChat">&times;</button>
        </div>
        <div class="chat-messages" id="fullscreenChatMessages">
            <div class="message-assistant"><div>Привет! Я помогу с учебой. Задай вопрос :)</div></div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="fullscreenChatInput" placeholder="Напишите вопрос...">
            <button id="fullscreenSendBtn">Отправить</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const currentPath = window.location.pathname;
        
        function highlightActiveLink() {
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                const href = link.getAttribute('href');
                if (href === currentPath) {
                    link.classList.add('active');
                } else if (href === '/' && currentPath === '/') {
                    link.classList.add('active');
                } else if (href !== '/' && currentPath.startsWith(href)) {
                    link.classList.add('active');
                }
            });
        }
        
        const chatModal = document.getElementById('fullscreenChat');
        
        function openFullscreenChat() {
            chatModal.style.display = 'flex';
        }
        
        function closeFullscreenChat() {
            chatModal.style.display = 'none';
        }
        
        function addMessage(role, text) {
            const messagesDiv = document.getElementById('fullscreenChatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = role === 'user' ? 'message-user' : 'message-assistant';
            messageDiv.innerHTML = `<div>${escapeHtml(text)}</div>`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function sendMessage() {
            const input = document.getElementById('fullscreenChatInput');
            const msg = input.value.trim();
            if (!msg) return;
            
            addMessage('user', msg);
            input.value = '';
            addMessage('assistant', '🤔 Думаю...');
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await response.json();
                const messagesDiv = document.getElementById('fullscreenChatMessages');
                messagesDiv.removeChild(messagesDiv.lastChild);
                addMessage('assistant', data.reply);
            } catch(e) {
                const messagesDiv = document.getElementById('fullscreenChatMessages');
                if (messagesDiv.lastChild) messagesDiv.removeChild(messagesDiv.lastChild);
                addMessage('assistant', '😔 Ошибка. Попробуйте позже.');
            }
        }
        
        document.getElementById('chatMenuBtn').onclick = openFullscreenChat;
        document.getElementById('closeFullscreenChat').onclick = closeFullscreenChat;
        document.getElementById('fullscreenSendBtn').onclick = sendMessage;
        document.getElementById('fullscreenChatInput').onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
        
        highlightActiveLink();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
<!-- Особенность: этот шаблон подключает единый UI чата и поведение меню для дочерних страниц. -->
